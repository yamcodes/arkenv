packages:
  - packages/*
  - packages/internal/*
  - apps/*
  - apps/playgrounds/*
allowBuilds:
  '@biomejs/biome': true
  '@parcel/watcher': true
  '@sentry/cli': true
  '@tailwindcss/oxide': true
  '@vercel/speed-insights': true
  bun: true
  core-js: true
  esbuild: true
  protobufjs: true
  sharp: true

catalog:
  '@ark/attest': 0.56.0
  '@axe-core/playwright': 4.11.3
  '@size-limit/esbuild-why': 12.1.0
  '@size-limit/preset-small-lib': 12.1.0
  '@types/bun': 1.3.13
  '@types/node': 24.12.2
  '@types/react': 19.2.14
  '@types/react-dom': 19.2.3
  '@vitejs/plugin-react': 6.0.1
  '@vitest/coverage-v8': ^4.1.5
  '@vitest/ui': 4.1.5
  arktype: 2.2.0
  bun: 1.3.13
  concurrently: 9.2.1
  esbuild: 0.28.0
  globals: 17.5.0
  next: 16.2.6
  react: 19.2.5
  react-dom: 19.2.5
  rimraf: 6.1.3
  size-limit: 12.1.0
  tsdown: 0.21.10
  tsx: 4.21.0
  typescript: 6.0.3
  valibot: 1.3.1
  vitest: 4.1.5
  zod: 4.4.1

overrides:
  '@playwright/test': 1.59.1
  import-in-the-middle: 2.0.6
  require-in-the-middle: 8.0.1
publicHoistPattern:
  - '*import-in-the-middle*'
  - '*require-in-the-middle*'
