description = "Setup ArkEnv in the current project"

prompt = """
Setup ArkEnv in the current project.

This command will:
1. Detect your project's framework and environment.
2. Initialize ArkEnv using the CLI (`pnpm dlx @arkenv/cli@latest init`).
3. Configure the necessary plugins and type augmentations.
4. Verify the setup.

**Steps**:

1. **Activate Skill**: Activate the `arkenv` skill to access specialized knowledge and patterns.
2. **Analysis**: Check the current project for:
   - Framework (Vite, Bun, Node, etc.)
   - Package manager
   - Existing environment variable usage (e.g., `.env` files)
3. **Execution**:
   - Run the initialization command: `pnpm dlx @arkenv/cli@latest init --yes`.
   - Follow the **Setup Workflow** defined in the `arkenv` skill.
4. **Refinement**:
   - Ensure `env.ts` is correctly scaffolded.
   - Update configuration files (like `vite.config.ts`) if the CLI didn't do it perfectly.
   - Set up type augmentation for the detected runtime.
5. **Validation**: Confirm the setup is working by checking types or running a build check.

If you encounter any issues during setup, report them and suggest manual fixes.
"""
