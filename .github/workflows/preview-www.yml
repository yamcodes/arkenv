name: Preview www (arkenv.js.org)
env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
  APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}
  TZ: ${{ vars.TIMEZONE || 'Asia/Almaty' }}
on:
  pull_request:
    types: [opened, synchronize, ready_for_review, labeled]
    paths:
      - "apps/www/**"
      - "packages/**"
      - ".github/workflows/preview-www.yml"
      - "pnpm-lock.yaml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  Deploy-Preview:
    if: |
      (github.event.action == 'labeled' && github.event.label.name == 'preview') ||
      (github.event.action != 'labeled' && (github.event.pull_request.draft == false || contains(github.event.pull_request.labels.*.name, 'preview')))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2
      - name: Set Turbo base/head for PRs
        run: |
          echo "TURBO_SCM_BASE=${{ github.event.pull_request.base.sha || github.event.before }}" >> $GITHUB_ENV
          echo "TURBO_SCM_HEAD=${{ github.sha }}" >> $GITHUB_ENV
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: pnpm
      - name: Install dependencies
        run: pnpm install
      - name: Restore deploy metrics
        uses: actions/cache@v5
        with:
          path: .github/deploy-metrics.json
          key: deploy-metrics-v1
      - name: Check preview deploy budget
        id: budget
        run: node .github/scripts/check-deploy-budget.cjs preview
      - name: Install Vercel CLI
        run: npm install --global vercel@latest
      - name: Pull Vercel Environment Information
        if: steps.budget.outputs.should_deploy == 'true'
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}
      - name: Build Project Artifacts
        if: steps.budget.outputs.should_deploy == 'true'
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}
      - name: Deploy Project Artifacts to Vercel
        if: steps.budget.outputs.should_deploy == 'true'
        id: deploy
        run: |
          set -o pipefail
          DEPLOYMENT_URL=$(vercel deploy --prebuilt --archive=tgz --token=${{ secrets.VERCEL_TOKEN }} | tail -n 1)
          echo "DEPLOYMENT_URL=$DEPLOYMENT_URL" >> $GITHUB_OUTPUT
      - name: Generate GitHub App Token
        id: generate-token
        uses: actions/create-github-app-token@v3
        if: env.APP_PRIVATE_KEY != ''
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
      - name: Comment PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v9
        with:
          github-token: ${{ steps.generate-token.outputs.token || secrets.GITHUB_TOKEN }}
          script: |
            const shouldDeploy = '${{ steps.budget.outputs.should_deploy }}' === 'true';
            const reason = '${{ steps.budget.outputs.reason }}';
            const remainingTime = '${{ steps.budget.outputs.remaining_time }}';
            const previewUrl = '${{ steps.deploy.outputs.DEPLOYMENT_URL }}';
            
            const metadataMarker = '[vc]: #DZOavKtcupv5eYfsJ0J5gTvtYR/BkSkF1UhfIwiSRtA=:';
            const introText = 'The latest updates on your projects. Learn more about [Vercel for GitHub](https://vercel.link/github-learn-more).';
            
            const now = new Date();
            const dateStr = now.toLocaleString('en-US', { 
              month: 'short', 
              day: 'numeric', 
              year: 'numeric', 
              hour: 'numeric', 
              minute: '2-digit', 
              hour12: true
            }).replace(',', '') + ' (' + process.env.TZ + ')';

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            
            const botComment = comments.find(c => 
              c.user?.type === 'Bot' &&
              (c.user?.login === 'arkenv-bot[bot]' || c.user?.login === 'github-actions[bot]') &&
              c.body?.includes(introText)
            );

            let table = '';
            if (shouldDeploy) {
              const feedbackUrl = 'https://vercel.live/open-feedback/' + new URL(previewUrl).hostname + '?via=pr-comment-feedback-link';
              table = [
                '| Project | Deployment | Review | Updated (' + process.env.TZ + ') |',
                '| :--- | :----- | :------ | :------ |',
                '| [arkenv](https://vercel.com/yamcodes/arkenv) | ![Ready](https://vercel.com/static/status/ready.svg) [Ready](' + previewUrl + ') | [Preview](' + previewUrl + '), [Comment](' + feedbackUrl + ') | ' + dateStr + ' |'
              ].join('\n');
            } else if (botComment) {
              const tableMatch = botComment.body.match(/\| Project \| Deployment \| Review \| Updated .*\n\| :--- \| :----- \| :------ \| :------ \|\n\| .*/);
              if (tableMatch) {
                table = tableMatch[0];
              }
            }

            let warningBlock = '';
            if (!shouldDeploy) {
              const warningTitle = reason === 'limit' ? 'Daily deployment limit reached' : 'Rate limit exceeded';
              const warningDesc = reason === 'limit' 
                ? `@${context.actor} has reached the daily limit for preview deployments. Please wait **${remainingTime}** before the quota resets.`
                : `@${context.actor} has exceeded the limit for the number of commits that can be reviewed per hour. Please wait **${remainingTime}** before requesting another review.`;

              warningBlock = [
                '> [!WARNING]',
                `> ## ${warningTitle}`,
                '>',
                `> ${warningDesc}`,
                '>',
                '> <details>',
                '> <summary>⌛ How to resolve this issue?</summary>',
                '>',
                '> After the wait time has elapsed, a review can be triggered by pushing new commits to this PR or by re-running the workflow.',
                '>',
                '> We recommend that you space out your commits to avoid hitting the rate limit.',
                '>',
                '> </details>',
                '>',
                '> <details>',
                '> <summary>🚦 How do rate limits work?</summary>',
                '>',
                '> We enforce hourly and daily rate limits to ensure stability and fair usage of resources.',
                '>',
                '> </details>',
                ''
              ].join('\n');
            }

            const bodyParts = [metadataMarker, introText, ''];
            if (warningBlock) bodyParts.push(warningBlock);
            if (table) bodyParts.push(table);
            const body = bodyParts.join('\n');

            try {
              if (botComment) {
                await github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: botComment.id,
                  body,
                });
              } else {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  body,
                });
              }
            } catch (error) {
              console.error('Failed to post PR comment:', error);
            }
      - name: Save deploy metrics
        if: always()
        uses: actions/cache/save@v5
        with:
          path: .github/deploy-metrics.json
          key: deploy-metrics-v1
