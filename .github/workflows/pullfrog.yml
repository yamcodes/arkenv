# PULLFROG ACTION — DO NOT EDIT EXCEPT WHERE INDICATED
name: Pullfrog
run-name: ${{ inputs.name || github.workflow }}
on:
  workflow_dispatch:
    inputs:
      prompt:
        type: string
        description: Agent prompt
      name:
        type: string
        description: Run name

permissions:
  contents: read
  pull-requests: read

jobs:
  pullfrog:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      pull-requests: read
    steps:
      - name: Check PR source
        id: check-pr-source
        uses: actions/github-script@v8
        with:
          script: |
            const match = context.payload.inputs?.prompt?.match(/github\.com\/[^/]+\/[^/]+\/pull\/(\d+)/)

            if (!match) {
              core.setOutput("skip", "false")
              return
            }

            const { data: pull } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: Number(match[1]),
            })

            const botLogins = new Set(["arkenv-bot", "arkenv-bot[bot]"])
            const shouldSkip = pull.head.ref === "changeset-release/dev" || botLogins.has(pull.user?.login)

            if (shouldSkip) {
              core.info(`Skipping Pullfrog for ${pull.head.ref} by ${pull.user?.login}`)
            }

            core.setOutput("skip", String(shouldSkip))
      - name: Checkout code
        if: steps.check-pr-source.outputs.skip != 'true'
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - name: Run agent
        if: steps.check-pr-source.outputs.skip != 'true'
        uses: pullfrog/pullfrog@v0
        with:
          prompt: ${{ inputs.prompt }}
        env:
          # add at least one provider API key
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GOOGLE_GENERATIVE_AI_API_KEY: ${{ secrets.GOOGLE_GENERATIVE_AI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          MOONSHOT_API_KEY: ${{ secrets.MOONSHOT_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
          # for Amazon Bedrock (https://docs.pullfrog.com/bedrock)
          # AWS_BEARER_TOKEN_BEDROCK: ${{ secrets.AWS_BEARER_TOKEN_BEDROCK }}
          # AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          # AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          # AWS_REGION: us-east-1
          # BEDROCK_MODEL_ID: us.anthropic.claude-opus-4-6-v1
