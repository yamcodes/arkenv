name: Sync PR

on:
  push:
    branches:
      - dev
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: false

jobs:
  sync-pr:
    name: Open or maintain Sync PR (dev → main)
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App Token
        id: generate-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout Repo
        uses: actions/checkout@v6
        with:
          token: ${{ steps.generate-token.outputs.token }}
          fetch-depth: 0

      - name: Create or maintain Sync PR
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
          PR_BODY: |
            This PR is automatically maintained by the **Sync PR** workflow.

            It tracks all commits on `dev` that have not yet been merged into `main`, keeping the two branches in sync after every push to `dev`.

            > [!NOTE]
            > This PR is opened and managed by **arkenv-bot**. It is skipped by Pullfrog and other bot-aware workflows.
        run: |
          git fetch origin dev main

          # Check if main is already fully merged into dev (no drift)
          if git merge-base --is-ancestor origin/dev origin/main; then
            echo "✅ dev is already up-to-date with main. No Sync PR needed."
            exit 0
          fi

          echo "🔄 dev is ahead of main. Ensuring a Sync PR exists..."

          # Look for an existing open PR from dev → main
          EXISTING_PR=$(gh pr list \
            --base main \
            --head dev \
            --state open \
            --json number \
            --jq '.[0].number')

          if [ -n "$EXISTING_PR" ]; then
            echo "✅ Sync PR #$EXISTING_PR already exists. Nothing to do — it will update automatically as dev changes."
          else
            echo "📬 No open Sync PR found. Creating one..."
            gh pr create \
              --base main \
              --head dev \
              --title "chore: sync dev → main" \
              --body "$PR_BODY" \
              --label "sync"
            echo "✅ Sync PR created."
          fi
