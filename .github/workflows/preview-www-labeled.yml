name: Preview www (Label Triggered)

on:
  pull_request:
    types: [labeled]
    branches:
      - dev
      - v1

concurrency:
  group: preview-www-labeled-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  Deploy-Preview:
    if: github.event.label.name == 'preview'
    uses: ./.github/workflows/preview-www-reusable.yml
    secrets: inherit
