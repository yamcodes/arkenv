name: Preview www Reusable

on:
  workflow_call:

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
  APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}
  TZ: ${{ vars.TIMEZONE || 'Asia/Almaty' }}

jobs:
  Deploy-Preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set Turbo base/head for PRs
        run: |
          echo "TURBO_SCM_BASE=${{ github.event.pull_request.base.sha || github.event.before }}" >> $GITHUB_ENV
          echo "TURBO_SCM_HEAD=${{ github.sha }}" >> $GITHUB_ENV
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: pnpm
      - name: Install dependencies
        run: pnpm install
      - name: Check if www is affected
        id: affected
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha || github.event.before }}"
          if [ -z "$BASE_SHA" ] || [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ]; then
            BASE_SHA="HEAD~1"
          fi
          echo "Comparing base ref: $BASE_SHA with head: ${{ github.sha }}"
          
          if pnpm exec turbo query affected --packages=www --base="$BASE_SHA" --head="${{ github.sha }}" --exit-code; then
            echo "www is NOT affected."
            echo "is_affected=false" >> $GITHUB_OUTPUT
          else
            echo "www IS affected."
            echo "is_affected=true" >> $GITHUB_OUTPUT
          fi
      - name: Install Vercel CLI
        # Pin the CLI to avoid upstream breakage from newly published majors.
        run: npm install --global vercel@54.7.1
      - name: Pull Vercel Environment Information
        if: steps.affected.outputs.is_affected == 'true'
        run: node scripts/vercel-wrapper.cjs pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}
      - name: Build Project Artifacts
        if: steps.affected.outputs.is_affected == 'true'
        run: node scripts/vercel-wrapper.cjs build --token=${{ secrets.VERCEL_TOKEN }}
      - name: Deploy Project Artifacts to Vercel
        if: steps.affected.outputs.is_affected == 'true'
        id: deploy
        run: |
          set -o pipefail
          DEPLOYMENT_URL=$(node scripts/vercel-wrapper.cjs deploy --prebuilt --archive=tgz --token=${{ secrets.VERCEL_TOKEN }} | tail -n 1)
          echo "DEPLOYMENT_URL=$DEPLOYMENT_URL" >> $GITHUB_OUTPUT
      - name: Generate GitHub App Token
        id: generate-token
        uses: actions/create-github-app-token@v3
        if: env.APP_PRIVATE_KEY != ''
        with:
          client-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
      - name: Comment PR
        if: github.event_name == 'pull_request' && steps.affected.outputs.is_affected == 'true'
        uses: actions/github-script@v9
        with:
          github-token: ${{ steps.generate-token.outputs.token || secrets.GITHUB_TOKEN }}
          script: |
            const previewUrl = '${{ steps.deploy.outputs.DEPLOYMENT_URL }}';

            const metadataMarker = '[vc]: #DZOavKtcupv5eYfsJ0J5gTvtYR/BkSkF1UhfIwiSRtA=:';
            const introText = 'The latest updates on your projects. Learn more about [Vercel for GitHub](https://vercel.link/github-learn-more).';

            if (!previewUrl) {
              console.log('No deployment URL produced; skipping PR comment.');
              return;
            }

            const now = new Date();
            const dateStr = now.toLocaleString('en-US', { 
              month: 'short', 
              day: 'numeric', 
              year: 'numeric', 
              hour: 'numeric', 
              minute: '2-digit', 
              hour12: true
            }).replace(',', '') + ' (' + process.env.TZ + ')';

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(c => 
              c.user?.type === 'Bot' &&
              (c.user?.login === 'arkenv-bot[bot]' || c.user?.login === 'github-actions[bot]') &&
              c.body?.includes(introText)
            );

            const feedbackUrl = 'https://vercel.live/open-feedback/' + new URL(previewUrl).hostname + '?via=pr-comment-feedback-link';
            const table = [
              '| Project | Deployment | Review | Updated (' + process.env.TZ + ') |',
              '| :--- | :----- | :------ | :------ |',
              '| [arkenv](https://vercel.com/yamcodes/arkenv) | ![Ready](https://vercel.com/static/status/ready.svg) [Ready](' + previewUrl + ') | [Preview](' + previewUrl + '), [Comment](' + feedbackUrl + ') | ' + dateStr + ' |'
            ].join('\n');

            const body = [metadataMarker, introText, '', table].join('\n');

            try {
              if (botComment) {
                await github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: botComment.id,
                  body,
                });
              } else {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  body,
                });
              }
            } catch (error) {
              console.error('Failed to post PR comment:', error);
            }
