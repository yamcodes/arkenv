name: Preview www Reusable

on:
  workflow_call:

# Non-secret defaults only. Vercel credentials are injected solely on Vercel CLI steps
# so untrusted PR HEAD install/build scripts do not see them ambiently.
env:
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}
  TZ: ${{ vars.TIMEZONE || 'Asia/Almaty' }}

jobs:
  Deploy-Preview:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          # pull_request_target defaults to the base ref; use the base repo's pull head
          # ref so fork commits resolve and base history remains available for turbo.
          ref: ${{ github.event.pull_request.number && format('refs/pull/{0}/head', github.event.pull_request.number) || github.sha }}
          persist-credentials: false
      - name: Set Turbo base/head for PRs
        env:
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          echo "TURBO_SCM_BASE=${PR_BASE_SHA}" >> "$GITHUB_ENV"
          echo "TURBO_SCM_HEAD=${PR_HEAD_SHA}" >> "$GITHUB_ENV"
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: pnpm
      - name: Install dependencies
        run: pnpm install
      - name: Check if www is affected
        id: affected
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          if [ -z "$BASE_SHA" ] || [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ]; then
            BASE_SHA="HEAD~1"
          fi
          echo "Comparing base ref: $BASE_SHA with head: $HEAD_SHA"

          # Deploy-path edits must still rebuild/alias branch domains (turbo won't mark www).
          if git diff --name-only "$BASE_SHA" "$HEAD_SHA" | grep -qE '^(\.github/workflows/preview-www|scripts/vercel-wrapper\.cjs)'; then
            echo "Preview deploy path changed; forcing www deploy."
            echo "is_affected=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if pnpm exec turbo query affected --packages=www --base="$BASE_SHA" --head="$HEAD_SHA" --exit-code; then
            echo "www is NOT affected."
            echo "is_affected=false" >> "$GITHUB_OUTPUT"
          else
            echo "www IS affected."
            echo "is_affected=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Install Vercel CLI
        # Pin the CLI to avoid upstream breakage from newly published majors.
        run: npm install --global vercel@54.7.1
      - name: Pull Vercel Environment Information
        if: steps.affected.outputs.is_affected == 'true'
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: node scripts/vercel-wrapper.cjs pull --yes --environment=preview --token="$VERCEL_TOKEN"
      - name: Build Project Artifacts
        if: steps.affected.outputs.is_affected == 'true'
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
        run: node scripts/vercel-wrapper.cjs build --token="$VERCEL_TOKEN"
      - name: Deploy Project Artifacts to Vercel
        if: steps.affected.outputs.is_affected == 'true'
        id: deploy
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          # Git meta so CLI deploys associate with the correct branch (branch domains / env).
          # See https://vercel.com/kb/guide/branch-variables-and-domains-not-linked-to-cli-deployments
          GIT_ORG: ${{ github.repository_owner }}
          GIT_REPO: ${{ github.event.repository.name }}
          GIT_REF: ${{ github.event.pull_request.head.ref || github.ref_name }}
          GIT_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          GIT_ACTOR: ${{ github.event.pull_request.head.user.login || github.actor }}
          GIT_COMMIT_MESSAGE: ${{ github.event.pull_request.title || github.event.head_commit.message || github.sha }}
          GIT_COMMIT_AUTHOR_NAME: ${{ github.event.head_commit.author.name || github.actor }}
        run: |
          set -o pipefail
          SHORT_MSG="$(printf '%s\n' "$GIT_COMMIT_MESSAGE" | head -n1)"
          DEPLOYMENT_URL=$(node scripts/vercel-wrapper.cjs deploy --prebuilt --archive=tgz --token="$VERCEL_TOKEN" \
            -m githubDeployment=1 \
            -m githubOrg="$GIT_ORG" \
            -m githubRepo="$GIT_REPO" \
            -m githubCommitOrg="$GIT_ORG" \
            -m githubCommitRepo="$GIT_REPO" \
            -m githubCommitRef="$GIT_REF" \
            -m githubCommitSha="$GIT_SHA" \
            -m githubCommitMessage="$SHORT_MSG" \
            -m githubCommitAuthorName="$GIT_COMMIT_AUTHOR_NAME" \
            -m githubCommitAuthorLogin="$GIT_ACTOR" \
            | tail -n 1)
          echo "DEPLOYMENT_URL=$DEPLOYMENT_URL" >> "$GITHUB_OUTPUT"
      # Explicit alias so branch domains stay current without native Vercel Git builds (#1460).
      # Only on push to dev/v1 — labeled PR previews keep ephemeral URLs and must not steal these.
      - name: Alias branch preview domain
        if: >-
          github.event_name == 'push' &&
          (github.ref_name == 'dev' || github.ref_name == 'v1') &&
          steps.affected.outputs.is_affected == 'true'
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          DEPLOYMENT_URL: ${{ steps.deploy.outputs.DEPLOYMENT_URL }}
          BRANCH: ${{ github.ref_name }}
        run: |
          case "$BRANCH" in
            dev) DOMAIN="arkenv-dev.vercel.app" ;;
            v1) DOMAIN="arkenv-v1.vercel.app" ;;
            *)
              echo "No branch domain mapping for $BRANCH; skipping alias."
              exit 0
              ;;
          esac
          if [ -z "$DEPLOYMENT_URL" ]; then
            echo "No deployment URL; skipping alias."
            exit 0
          fi
          echo "Aliasing $DEPLOYMENT_URL -> $DOMAIN"
          node scripts/vercel-wrapper.cjs alias set "$DEPLOYMENT_URL" "$DOMAIN" --token="$VERCEL_TOKEN"
      - name: Generate GitHub App Token
        id: generate-token
        uses: actions/create-github-app-token@v3
        if: vars.APP_ID != ''
        with:
          client-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
      - name: Comment PR
        if: github.event_name != 'push' && steps.affected.outputs.is_affected == 'true'
        uses: actions/github-script@v9
        with:
          github-token: ${{ steps.generate-token.outputs.token || secrets.GITHUB_TOKEN }}
          script: |
            const previewUrl = '${{ steps.deploy.outputs.DEPLOYMENT_URL }}';

            const metadataMarker = '[vc]: #DZOavKtcupv5eYfsJ0J5gTvtYR/BkSkF1UhfIwiSRtA=:';
            const introText = 'The latest updates on your projects. Learn more about [Vercel for GitHub](https://vercel.link/github-learn-more).';

            if (!previewUrl) {
              console.log('No deployment URL produced; skipping PR comment.');
              return;
            }

            const now = new Date();
            const dateStr = now.toLocaleString('en-US', { 
              month: 'short', 
              day: 'numeric', 
              year: 'numeric', 
              hour: 'numeric', 
              minute: '2-digit', 
              hour12: true
            }).replace(',', '') + ' (' + process.env.TZ + ')';

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(c => 
              c.user?.type === 'Bot' &&
              (c.user?.login === 'arkenv-bot[bot]' || c.user?.login === 'github-actions[bot]') &&
              c.body?.includes(introText)
            );

            const feedbackUrl = 'https://vercel.live/open-feedback/' + new URL(previewUrl).hostname + '?via=pr-comment-feedback-link';
            const table = [
              '| Project | Deployment | Review | Updated (' + process.env.TZ + ') |',
              '| :--- | :----- | :------ | :------ |',
              '| [arkenv](https://vercel.com/yamcodes/arkenv) | ![Ready](https://vercel.com/static/status/ready.svg) [Ready](' + previewUrl + ') | [Preview](' + previewUrl + '), [Comment](' + feedbackUrl + ') | ' + dateStr + ' |'
            ].join('\n');

            const body = [metadataMarker, introText, '', table].join('\n');

            try {
              if (botComment) {
                await github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: botComment.id,
                  body,
                });
              } else {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  body,
                });
              }
            } catch (error) {
              console.error('Failed to post PR comment:', error);
            }
